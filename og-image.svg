<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6aef"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c6aef"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="lines" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#e4e4ef"/>
    </linearGradient>
    <linearGradient id="prompt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c6aef"/>
    </linearGradient>
    <linearGradient id="glow-line" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c6aef" stop-opacity="0"/>
      <stop offset="30%" stop-color="#7c6aef" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-grad)"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#e4e4ef" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#e4e4ef" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#e4e4ef" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#e4e4ef" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#e4e4ef" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#e4e4ef" stroke-width="1"/>
  </g>

  <!-- Glow behind logo -->
  <ellipse cx="195" cy="320" rx="120" ry="120" fill="#7c6aef" opacity="0.06"/>

  <!-- Logo (centered vertically) -->
  <g transform="translate(105, 225) scale(0.95)">
    <path d="M30,16 L60,16 L60,30 L44,30 L44,170 L60,170 L60,184 L30,184 Z" fill="url(#frame)"/>
    <path d="M140,16 L170,16 L170,184 L140,184 L140,170 L156,170 L156,30 L140,30 Z" fill="url(#frame)"/>
    <path d="M44,152 L156,152 L156,170 L44,170 Z" fill="url(#frame)"/>
    <polygon points="58,42 82,58 58,74" fill="url(#prompt)"/>
    <rect x="108" y="38" width="20" height="36" rx="2" fill="#e4e4ef"/>
    <rect x="58" y="88" width="84" height="8" rx="4" fill="url(#lines)"/>
    <rect x="58" y="106" width="84" height="8" rx="4" fill="url(#lines)" opacity="0.7"/>
    <rect x="58" y="124" width="60" height="8" rx="4" fill="url(#lines)" opacity="0.45"/>
  </g>

  <!-- Title -->
  <text x="355" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#e4e4ef" letter-spacing="-2">SoloBoard</text>

  <!-- Subtitle -->
  <text x="360" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#8888a4">Invisible personal kanban for Claude Code</text>

  <!-- Separator -->
  <rect x="360" y="375" width="480" height="1" fill="url(#glow-line)"/>

  <!-- Tagline -->
  <text x="360" y="410" font-family="ui-monospace, monospace" font-size="19" fill="#7c6aef">you code. board tracks. that's it.</text>

  <!-- Badges -->
  <g transform="translate(360, 440)">
    <rect width="110" height="36" rx="6" fill="#1e1e2e" stroke="#2a2a3d" stroke-width="1"/>
    <rect width="52" height="36" rx="6" fill="url(#accent)"/>
    <text x="26" y="24" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">44</text>
    <text x="80" y="24" font-family="ui-monospace, monospace" font-size="14" font-weight="500" fill="#e4e4ef" text-anchor="middle">tools</text>
  </g>
  <g transform="translate(485, 440)">
    <rect width="110" height="36" rx="6" fill="#1e1e2e" stroke="#2a2a3d" stroke-width="1"/>
    <rect width="52" height="36" rx="6" fill="#7c6aef"/>
    <text x="26" y="24" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">MCP</text>
    <text x="80" y="24" font-family="ui-monospace, monospace" font-size="14" font-weight="500" fill="#e4e4ef" text-anchor="middle">server</text>
  </g>
  <g transform="translate(610, 440)">
    <rect width="100" height="36" rx="6" fill="#1e1e2e" stroke="#2a2a3d" stroke-width="1"/>
    <rect width="46" height="36" rx="6" fill="#34d399"/>
    <text x="23" y="24" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">MIT</text>
    <text x="72" y="24" font-family="ui-monospace, monospace" font-size="14" font-weight="500" fill="#e4e4ef" text-anchor="middle">license</text>
  </g>

  <!-- Mini kanban board on the right -->
  <g transform="translate(820, 120)" opacity="0.7">
    <rect width="400" height="400" rx="14" fill="#1a1a26" stroke="#2a2a3d" stroke-width="1"/>

    <!-- Column headers -->
    <text x="40" y="40" font-family="ui-monospace, monospace" font-size="13" font-weight="600" fill="#8888a4" letter-spacing="2">TODO</text>
    <text x="160" y="40" font-family="ui-monospace, monospace" font-size="13" font-weight="600" fill="#a78bfa" letter-spacing="2">DOING</text>
    <text x="290" y="40" font-family="ui-monospace, monospace" font-size="13" font-weight="600" fill="#34d399" letter-spacing="2">DONE</text>

    <line x1="20" y1="55" x2="380" y2="55" stroke="#2a2a3d" stroke-width="1"/>

    <!-- Column dividers -->
    <line x1="140" y1="55" x2="140" y2="380" stroke="#2a2a3d" stroke-width="1" opacity="0.5"/>
    <line x1="270" y1="55" x2="270" y2="380" stroke="#2a2a3d" stroke-width="1" opacity="0.5"/>

    <!-- TODO cards -->
    <g transform="translate(20, 70)">
      <rect width="110" height="50" rx="7" fill="#12121a" stroke="#2a2a3d" stroke-width="1"/>
      <rect x="10" y="12" width="55" height="7" rx="3.5" fill="#8888a4" opacity="0.5"/>
      <rect x="10" y="27" width="75" height="7" rx="3.5" fill="#8888a4" opacity="0.3"/>
      <circle cx="93" cy="15" r="5" fill="#fbbf24" opacity="0.7"/>
    </g>
    <g transform="translate(20, 132)">
      <rect width="110" height="50" rx="7" fill="#12121a" stroke="#2a2a3d" stroke-width="1"/>
      <rect x="10" y="12" width="68" height="7" rx="3.5" fill="#8888a4" opacity="0.5"/>
      <rect x="10" y="27" width="45" height="7" rx="3.5" fill="#8888a4" opacity="0.3"/>
      <circle cx="93" cy="15" r="5" fill="#60a5fa" opacity="0.7"/>
    </g>

    <!-- DOING card (active, highlighted) -->
    <g transform="translate(150, 70)">
      <rect width="110" height="70" rx="7" fill="#12121a" stroke="#7c6aef" stroke-width="2"/>
      <rect x="10" y="12" width="65" height="7" rx="3.5" fill="#a78bfa" opacity="0.8"/>
      <rect x="10" y="27" width="80" height="7" rx="3.5" fill="#8888a4" opacity="0.4"/>
      <rect x="10" y="46" width="50" height="7" rx="3.5" fill="#34d399" opacity="0.4"/>
      <circle cx="93" cy="15" r="5" fill="#f87171" opacity="0.9"/>
    </g>

    <!-- DONE cards -->
    <g transform="translate(280, 70)">
      <rect width="100" height="42" rx="7" fill="#12121a" stroke="#2a2a3d" stroke-width="1"/>
      <rect x="10" y="11" width="55" height="7" rx="3.5" fill="#34d399" opacity="0.5"/>
      <rect x="10" y="25" width="70" height="6" rx="3" fill="#8888a4" opacity="0.2"/>
      <!-- Checkmark -->
      <path d="M80,10 L84,16 L92,6" stroke="#34d399" stroke-width="2" fill="none" opacity="0.7"/>
    </g>
    <g transform="translate(280, 122)">
      <rect width="100" height="42" rx="7" fill="#12121a" stroke="#2a2a3d" stroke-width="1"/>
      <rect x="10" y="11" width="65" height="7" rx="3.5" fill="#34d399" opacity="0.5"/>
      <rect x="10" y="25" width="48" height="6" rx="3" fill="#8888a4" opacity="0.2"/>
      <path d="M80,10 L84,16 L92,6" stroke="#34d399" stroke-width="2" fill="none" opacity="0.7"/>
    </g>
    <g transform="translate(280, 174)">
      <rect width="100" height="42" rx="7" fill="#12121a" stroke="#2a2a3d" stroke-width="1"/>
      <rect x="10" y="11" width="52" height="7" rx="3.5" fill="#34d399" opacity="0.5"/>
      <rect x="10" y="25" width="60" height="6" rx="3" fill="#8888a4" opacity="0.2"/>
      <path d="M80,10 L84,16 L92,6" stroke="#34d399" stroke-width="2" fill="none" opacity="0.7"/>
    </g>

    <!-- Terminal prompt at bottom -->
    <g transform="translate(20, 310)">
      <rect width="360" height="70" rx="8" fill="#0a0a0f" stroke="#2a2a3d" stroke-width="1"/>
      <text x="14" y="28" font-family="ui-monospace, monospace" font-size="13" fill="#34d399">$</text>
      <text x="28" y="28" font-family="ui-monospace, monospace" font-size="13" fill="#8888a4">fix the login bug on mobile</text>
      <text x="14" y="52" font-family="ui-monospace, monospace" font-size="12" fill="#7c6aef" opacity="0.7">  task silently created in DOING</text>
    </g>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#glow-line)"/>
  <!-- Bottom accent line -->
  <rect x="0" y="637" width="1280" height="3" fill="url(#glow-line)"/>
</svg>
